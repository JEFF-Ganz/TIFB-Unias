<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - TIF-B CyberSquad</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="shortcut icon" href="https://unias.ac.id/public/img/unias.png" type="image/x-icon" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #8b5cf6;
      --red: #ef4444;
      --dark: #0f0f1a;
      --card: #1a1a2e;
      --border: #2d2d4e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(139,92,246,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: var(--red); bottom: -80px; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat {
      from { transform: scale(1) translate(0,0); }
      to   { transform: scale(1.2) translate(20px,20px); }
    }

    .login-card {
      position: relative; z-index: 10;
      background: rgba(26,26,46,0.85);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%; max-width: 440px;
      box-shadow: 0 0 60px rgba(139,92,246,0.15), 0 32px 64px rgba(0,0,0,0.5);
      animation: cardSlideIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-area {
      text-align: center; margin-bottom: 36px;
    }
    .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--purple), var(--red));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(139,92,246,0.4);
      font-size: 28px; color: #fff;
    }
    .logo-title {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, var(--purple), var(--red));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 14px; transition: color 0.3s;
    }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px 14px 44px;
      color: var(--text); font-family: 'Poppins', sans-serif; font-size: 14px;
      outline: none; transition: all 0.3s;
    }
    .form-input:focus {
      border-color: var(--purple);
      background: rgba(139,92,246,0.06);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
    }
    .form-input:focus ~ .input-icon { color: var(--purple); }
    .form-input::placeholder { color: #4a4a6a; }

    .toggle-pass {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 4px; transition: color 0.3s;
    }
    .toggle-pass:hover { color: var(--purple); }

    .login-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--purple), var(--red));
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
      margin-top: 8px;
    }
    .login-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%); transition: transform 0.5s;
    }
    .login-btn:hover::before { transform: translateX(100%); }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(139,92,246,0.5); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .alert {
      padding: 12px 16px; border-radius: 10px; font-size: 13px;
      display: none; margin-bottom: 16px; align-items: center; gap: 10px;
    }
    .alert.show { display: flex; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    .back-link {
      display: block; text-align: center; margin-top: 24px;
      color: var(--muted); font-size: 13px; text-decoration: none; transition: color 0.3s;
    }
    .back-link:hover { color: var(--purple); }
    .back-link i { margin-right: 6px; }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: inline-block; }
    .loading .btn-text { display: none; }

    .security-badge {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      color: var(--muted); font-size: 12px; margin-top: 20px;
    }
    .security-badge i { color: #10b981; font-size: 11px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-shield-alt"></i>
      </div>
      <div class="logo-title">Admin Panel</div>
      <div class="logo-sub">TIF-B CyberSquad — Kontrol Website</div>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Admin</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="adminEmail" class="form-input" placeholder="admin@tifb.com" required autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="adminPassword" class="form-input" placeholder="Masukkan password" required autocomplete="current-password" />
          <button type="button" class="toggle-pass" id="togglePass">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span class="btn-text"><i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Masuk ke Admin</span>
        <div class="spinner"></div>
      </button>
    </form>

    <a href="index.html" class="back-link">
      <i class="fas fa-arrow-left"></i>Kembali ke Website
    </a>

    <div class="security-badge">
      <i class="fas fa-lock"></i>
      Koneksi aman dan terenkripsi
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn  = document.getElementById('loginBtn');
    const alertBox  = document.getElementById('alertBox');
    const togglePass = document.getElementById('togglePass');
    const passInput  = document.getElementById('adminPassword');

    // Toggle password visibility
    togglePass.addEventListener('click', () => {
      const isPass = passInput.type === 'password';
      passInput.type = isPass ? 'text' : 'password';
      togglePass.querySelector('i').className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    function showAlert(message, type = 'error') {
      alertBox.className = `alert show alert-${type}`;
      alertBox.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>${message}`;
    }

    function setLoading(on) {
      loginBtn.disabled = on;
      loginBtn.classList.toggle('loading', on);
    }

    // Check if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'admin-dashboard.html';
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;

      setLoading(true);
      try {
        await auth.signInWithEmailAndPassword(email, password);
        showAlert('Login berhasil! Mengalihkan...', 'success');
        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
      } catch (err) {
        let msg = 'Email atau password salah.';
        if (err.code === 'auth/too-many-requests') msg = 'Terlalu banyak percobaan. Coba lagi nanti.';
        if (err.code === 'auth/network-request-failed') msg = 'Tidak ada koneksi internet.';
        if (err.code === 'auth/invalid-api-key' || err.code === 'auth/app-not-initialized') {
          msg = '⚠️ Firebase belum dikonfigurasi. Buka firebase-config.js dan isi dengan konfigurasi Firebase Anda.';
        }
        showAlert(msg);
        setLoading(false);
      }
    });
  </script>
</body>
</html>
